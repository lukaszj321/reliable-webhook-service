name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql+psycopg://reliable_webhook:reliable_webhook@127.0.0.1:5432/reliable_webhook
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: reliable_webhook
          POSTGRES_PASSWORD: reliable_webhook
          POSTGRES_DB: reliable_webhook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reliable_webhook -d reliable_webhook"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest -W error

      - name: Run Ruff
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run mypy
        run: python -m mypy src
